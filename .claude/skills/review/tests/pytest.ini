[pytest]
# Pytest configuration for review skill tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test markers
markers =
    functional: Functionality tests (based on "What it does")
    arguments: Argument validation tests (based on "Arguments")
    safety: Safety mechanism tests (based on "Safety Features")
    errors: Error handling tests (based on "Error Handling")
    integration: Integration tests (based on "Usage Examples")
    slow: Slow-running tests (>1 second)
    unit: Fast unit tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --capture=no

# Coverage settings
[coverage:run]
source = ../.
omit = */tests/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
