# 决策规则配置
# Version: 1.0.0
# Last Updated: 2026-03-19

# ==================== 策略定义 ====================

strategies:
  quick:
    name: "快速检查"
    description: "仅检查关键问题，适用于小改动"
    score_range: [0, 19]
    estimated_tokens: 3000
    perspectives:
      goal_achievement:
        enabled: true
        depth: light
      architecture_design:
        enabled: false
        depth: skip
      quality_assurance:
        enabled: false
        depth: skip
      risk_control:
        enabled: true
        depth: light

  targeted:
    name: "定向检查"
    description: "根据改动路径选择性检查，适用于关键路径改动"
    score_range: [20, 39]
    estimated_tokens: 6000
    perspectives:
      goal_achievement:
        enabled: true
        depth: full
      architecture_design:
        enabled: true
        depth: full
      quality_assurance:
        enabled: false
        depth: light
      risk_control:
        enabled: true
        depth: full

  standard:
    name: "标准检查"
    description: "检查所有4个视角（轻量级），适用于中等改动"
    score_range: [40, 69]
    estimated_tokens: 8000
    perspectives:
      goal_achievement:
        enabled: true
        depth: full
      architecture_design:
        enabled: true
        depth: light
      quality_assurance:
        enabled: true
        depth: light
      risk_control:
        enabled: true
        depth: full

  deep:
    name: "深度检查"
    description: "全面深度检查，适用于大改动或高风险改动"
    score_range: [70, 100]
    estimated_tokens: 15000
    perspectives:
      goal_achievement:
        enabled: true
        depth: full
      architecture_design:
        enabled: true
        depth: full
      quality_assurance:
        enabled: true
        depth: full
      risk_control:
        enabled: true
        depth: full

# ==================== 关键路径模式 ====================

critical_paths:
  # 认证和授权
  - pattern: "/auth/"
    name: "认证系统"
    risk_level: critical
    description: "用户认证和授权相关代码，影响安全性"
    triggers:
      - force_perspective: risk_control
      - min_depth: full

  # API接口
  - pattern: "/api/"
    name: "API接口"
    risk_level: high
    description: "API端点定义，影响前后端集成"
    triggers:
      - force_perspective: architecture_design
      - min_depth: light

  # 数据库层
  - pattern: "/database/"
    name: "数据库层"
    risk_level: critical
    description: "数据库操作和迁移，影响数据完整性"
    triggers:
      - force_perspective: risk_control
      - force_perspective: architecture_design
      - min_depth: full

  # 缓存系统
  - pattern: "/cache/"
    name: "缓存系统"
    risk_level: high
    description: "缓存逻辑，影响性能和一致性"
    triggers:
      - force_perspective: architecture_design
      - min_depth: light

  # 支付系统
  - pattern: "/payment/"
    name: "支付系统"
    risk_level: critical
    description: "支付处理，影响财务安全"
    triggers:
      - force_perspective: risk_control
      - force_perspective: quality_assurance
      - min_depth: full

  # 安全模块
  - pattern: "/security/"
    name: "安全模块"
    risk_level: critical
    description: "安全相关代码，影响系统安全性"
    triggers:
      - force_perspective: risk_control
      - min_depth: full

  # 核心模块
  - pattern: "/core/"
    name: "核心模块"
    risk_level: high
    description: "核心业务逻辑，影响多个功能"
    triggers:
      - force_perspective: architecture_design
      - min_depth: light

  # 基础设施
  - pattern: "/infrastructure/"
    name: "基础设施"
    risk_level: high
    description: "基础设施代码（日志、监控等）"
    triggers:
      - force_perspective: architecture_design
      - min_depth: light

  # 数据库迁移
  - pattern: "migration|schema"
    name: "数据库迁移"
    risk_level: critical
    description: "数据库结构变更，需要仔细审查"
    triggers:
      - force_perspective: risk_control
      - force_perspective: quality_assurance
      - min_depth: full

  # 依赖管理
  - pattern: "package\\.json|requirements\\.txt|Cargo\\.toml"
    name: "依赖管理"
    risk_level: medium
    description: "依赖变更，可能引入安全漏洞"
    triggers:
      - force_perspective: risk_control
      - min_depth: light

  # 配置文件（环境变量、密钥等）
  - pattern: "\\.env|config|secrets"
    name: "配置文件"
    risk_level: high
    description: "配置变更，可能影响运行时行为"
    triggers:
      - force_perspective: risk_control
      - min_depth: light

  # CI/CD流程
  - pattern: "\\.github/workflows|\\.gitlab-ci|Jenkinsfile"
    name: "CI/CD流程"
    risk_level: medium
    description: "部署流程变更，可能影响发布"
    triggers:
      - force_perspective: risk_control
      - min_depth: light

# ==================== 决策权重 ====================

decision_weights:
  scale: 0.3              # 改动规模权重（30%）
  complexity: 0.3         # 复杂度权重（30%）
  critical_paths: 0.4     # 关键路径权重（40%）

# ==================== 规模评分 ====================

scale_scores:
  tiny:        10    # <50行
  small:       30    # 50-200行
  medium:      50    # 200-500行
  large:       75    # 500-1000行
  very_large: 100    # >1000行

# ==================== 复杂度因素 ====================

complexity_factors:
  large_file_changes:
    threshold: 300            # 单文件改动超过300行
    score: 20
    description: "大量代码改动"

  many_files:
    threshold: 15             # 改动超过15个文件
    score: 15
    description: "涉及多个文件"

  critical_path:
    score: 25
    description: "触及关键路径"

  new_files:
    threshold: 5              # 新增超过5个文件
    score: 10
    description: "大量新增文件"

  low_test_ratio:
    threshold: 0.3            # 测试文件比例低于30%
    score: 15
    description: "测试覆盖不足"

  config_changes:
    score: 10
    description: "配置文件变更"

# ==================== 视角强制规则 ====================

force_rules:
  # 规则1：关键路径改动至少使用targeted策略
  critical_path_minimum:
    condition: "critical_paths.length > 0"
    min_strategy: targeted

  # 规则2：超大改动强制deep策略
  very_large_changes:
    condition: "scale == very_large"
    force_strategy: deep

  # 规则3：配置变更强制检查风险
  config_changes:
    condition: "file_types.config > 0"
    force_perspectives:
      - risk_control

  # 规则4：新增文件多强制检查架构
  many_new_files:
    condition: "new_files > 5"
    force_perspectives:
      - architecture_design

  # 规则5：测试覆盖不足强制检查质量
  low_test_coverage:
    condition: "test_ratio < 0.3"
    force_perspectives:
      - quality_assurance

# ==================== Token优化目标 ====================

token_budget:
  # 预期token消耗分布（100次操作）
  distribution:
    quick:     50%    # 50次 × 3K = 150K tokens
    targeted:  30%    # 30次 × 6K = 180K tokens
    standard:  15%    # 15次 × 8K = 120K tokens
    deep:       5%    #  5次 × 15K = 75K tokens
    # 总计：525K tokens

  # 与全视角对比
  baseline:
    eval_plan:  8000   # 全视角eval-plan
    review:    15000   # 全视角review

  # 优化目标
  target:
    eval_plan:  6000   # 平均6K（节省25%）
    review:     6300   # 平均6.3K（节省58%）
    overall_savings: "50%"

# ==================== 示例决策场景 ====================

examples:
  - scenario: "小bug修复（1个文件，20行）"
    analysis:
      scale: tiny
      complexity: simple
      critical_paths: []
    decision:
      strategy: quick
      reasoning: "微小改动，仅检查目标和风险"
      estimated_tokens: 3000

  - scenario: "认证模块改动（3个文件，150行）"
    analysis:
      scale: small
      complexity: moderate
      critical_paths: ["认证系统"]
    decision:
      strategy: targeted
      reasoning: "小改动但触及关键路径，定向检查架构和风险"
      estimated_tokens: 6000

  - scenario: "新功能开发（12个文件，450行）"
    analysis:
      scale: medium
      complexity: complex
      critical_paths: []
    decision:
      strategy: standard
      reasoning: "中等改动，标准4视角检查"
      estimated_tokens: 8000

  - scenario: "大型重构（25个文件，1200行，涉及数据库）"
    analysis:
      scale: very_large
      complexity: very_complex
      critical_paths: ["数据库层", "核心模块"]
    decision:
      strategy: deep
      reasoning: "超大改动且触及关键路径，深度全面检查"
      estimated_tokens: 15000
