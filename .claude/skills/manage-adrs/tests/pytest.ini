[pytest]
# Pytest configuration for manage-adrs tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    functional: Functional tests for core "What it does" features
    arguments: Tests for argument parsing and validation
    safety: Tests for safety mechanisms
    error: Tests for error handling
    integration: Integration tests for end-to-end workflows
    slow: Tests that take longer to run

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.claude/skills/manage-adrs
    --cov-report=term-missing
    --cov-report=html

# Coverage options
[coverage:run]
omit =
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
skip_empty = true
