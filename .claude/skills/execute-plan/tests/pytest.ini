[pytest]
# pytest configuration for execute-plan tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Test markers
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for workflows
    functional: Functional tests from "What it does"
    safety: Safety feature tests
    error: Error handling tests
    slow: Tests that take significant time

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
