[pytest]
# pytest configuration for eval-plan tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, use fixtures)
    functional: Functional tests (test complete workflows)
    parametrize: Parametrized tests
    slow: Slow tests (skip with -m "not slow")

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.claude/skills/eval-plan
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

# Test paths
testpaths = .claude/skills/eval-plan/tests

# Coverage options
[coverage:run]
source = .claude/skills/eval-plan
omit =
    **/tests/**
    **/conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
